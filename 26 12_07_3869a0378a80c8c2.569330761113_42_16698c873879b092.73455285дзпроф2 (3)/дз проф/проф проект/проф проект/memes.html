<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My_personal_page - Мемы</title>
    <style>
        @import url('fonts/main_font.css');

        * {
            margin: 0;
            font-family: 'StratosSkyeng', sans-serif;
        }

        .content {
            background-size: cover;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
        }
        
        .center {
            padding-left: calc(50% - 500px);  
            padding-right: calc(50% - 500px);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        h2 {
            font-size: 32px;
            margin: 25px 0 15px 0;
            color: #f0f0f0;
        }

        .header-text {
            text-align: left;
            width: 100%;
            margin-bottom: 30px;
        }

        .memes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .meme-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meme-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .meme-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .meme-image:hover {
            border-color: white;
            transform: scale(1.02);
        }

        .meme-placeholder {
            width: 100%;
            height: 250px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 18px;
            border: 2px solid white;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: white;
            color: #764ba2;
            transform: scale(1.05);
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .btn-facts {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .btn-facts:hover {
            background: #667eea;
            color: white;
        }

        .btn-quotes {
            background: rgba(255, 215, 0, 0.2);
            border-color: #FFD700;
        }

        .btn-quotes:hover {
            background: #FFD700;
            color: #764ba2;
        }

        @media (max-width: 1100px) {
            .center {
                padding-left: 20px;
                padding-right: 20px;
            }
            
            h1 {
                font-size: 36px;
            }
            
            h2 {
                font-size: 28px;
            }
            
            .memes-grid {
                grid-template-columns: 1fr;
            }
            
            .buttons-container {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 28px;
            }
            
            h2 {
                font-size: 24px;
            }
            
            .meme-image, .meme-placeholder {
                height: 200px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="content center">
        <div class="header-text">
            <h1>Мемы про программистов</h1>
            <h2>Поржать и погрустить</h2>
        </div>

        <div class="memes-grid">
            <div class="meme-card">
                <img src="images/meme_1.jpg" alt="Мем 1" class="meme-image" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'meme-placeholder\'>📷</div>';">
            </div>

            <div class="meme-card">
                <img src="images/meme_2.jpg" alt="Мем 2" class="meme-image" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'meme-placeholder\'>📷</div>';">
            </div>

            <div class="meme-card">
                <img src="images/meme_3.jpg" alt="Мем 3" class="meme-image" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'meme-placeholder\'>📷</div>';">
            </div>

            <div class="meme-card">
                <img src="images/meme_4.jpg" alt="Мем 4" class="meme-image" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'meme-placeholder\'>📷</div>';">
            </div>

            <div class="meme-card">
                <img src="images/meme_5.jpg" alt="Мем 5" class="meme-image" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'meme-placeholder\'>📷</div>';">
            </div>

            <div class="meme-card">
                <img src="images/meme_6.jpg" alt="Мем 6" class="meme-image" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'meme-placeholder\'>📷</div>';">
            </div>
        </div>

        <div class="buttons-container">
            <a href="index.html" class="btn btn-home">← На главную</a>
            <a href="facts.html" class="btn btn-facts">← К фактам</a>
            <a href="quotes.html" class="btn btn-quotes">Цитаты →</a>
        </div>
    </div>
</body>
</html>
